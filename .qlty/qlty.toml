config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/.yarn/**",
  "**/*.d.ts",
  "**/assets/**",
  "**/bower_components/**",
  "**/build/**",
  "**/cache/**",
  "**/config/**",
  "**/db/**",
  "**/deps/**",
  "**/dist/**",
  "**/extern/**",
  "**/external/**",
  "**/generated/**",
  "**/Godeps/**",
  "**/gradlew/**",
  "**/mvnw/**",
  "**/node_modules/**",
  "**/protos/**",
  "**/seed/**",
  "**/target/**",
  "**/templates/**",
  "**/testdata/**",
  "**/vendor/**",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

# Memory-leak (memlab) harness: memlab/faker are devDependencies and the runner
# loads scenario files dynamically. These are intentional for the test harness
# and already disabled in eslint.config.mjs, but qlty runs eslint with its own
# config where the path-scoped override does not apply, so silence them here.
[[triage]]
match.plugins = ["eslint"]
match.rules = [
  "eslint:import/no-extraneous-dependencies",
  "eslint:import/no-unresolved",
  "eslint:global-require",
  "eslint:import/no-dynamic-require",
]
match.file_patterns = ["tests/memory-leak/**"]
set.ignored = true

# radarlint S7026 ("replace curl with ADD") is a non-blocking advisory that
# conflicts with hadolint, which prefers curl for URL downloads and rejects the
# `ADD --checksum` integrity form as an invalid flag. Dockerfile.rca uses curl
# with an explicit sha256 check and an arch-conditional download (the prebuilt is
# amd64-only; arm64 builds from source), which is the verified, hadolint-clean
# approach, so this advisory does not apply here.
[[triage]]
match.plugins = ["radarlint-iac"]
match.rules = ["radarlint-iac:docker:S7026"]
match.file_patterns = ["Dockerfile.rca"]
set.ignored = true

[smells]
mode = "comment"

