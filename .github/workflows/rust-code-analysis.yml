name: rust-code-analysis

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  rust-code-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Detect runtime project files
        id: project
        run: |
          if [[ -f package.json && -f bun.lock && -f config/metrics-policy.json ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip metrics check
        if: steps.project.outputs.present != 'true'
        run: echo "Skipping metrics check because this bootstrap PR does not include the project runtime files yet."

      - name: Run metrics gate
        if: steps.project.outputs.present == 'true'
        run: make lint-metrics
