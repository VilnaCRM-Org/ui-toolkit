name: integration testing
on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Detect integration inputs
        id: project
        run: |
          if [[ -f package.json && -f bun.lock && -f jest.integration.config.ts ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip integration tests
        if: steps.project.outputs.present != 'true'
        run: echo "Skipping integration tests because this bootstrap PR does not include the project runtime files yet."

      - name: Start docker test environment
        if: steps.project.outputs.present == 'true'
        run: make start-bun

      - name: Run integration tests
        if: steps.project.outputs.present == 'true'
        run: make test-integration

      - name: Stop docker test environment
        if: always() && steps.project.outputs.present == 'true'
        run: make down
